    --radius-md: 8px;
    --radius-lg: 12px;
    --font-sans: system-ui, -apple-system, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1a;
      --bg-secondary: #242422;
      --bg-tertiary: #2c2c2a;
      --text-primary: #f0ede8;
      --text-secondary: #9e9e9a;
      --text-tertiary: #6b6b68;
      --border-tertiary: rgba(255,255,255,0.10);
      --border-secondary: rgba(255,255,255,0.20);
      --border-primary: rgba(255,255,255,0.30);
      --border-info: #378add;
      --text-info: #85b7eb;
      --bg-info: #04294f;
    }
  }
  body {
    font-family: var(--font-sans);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem;
    line-height: 1.5;
  }
  #app {
    max-width: 740px;
    margin: 0 auto;
  }
  h1 {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 0.25rem;
  }
  .subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
  }
  .nav {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .btn {
    background: transparent;
    border: 0.5px solid var(--border-secondary);
    border-radius: var(--radius-md);
    padding: 6px 13px;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-secondary);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-sans);
    transition: background 0.12s;
  }
  .btn:hover { background: var(--bg-secondary); }
  .btn.active {
    background: var(--bg-secondary);
    border-color: var(--border-primary);
    color: var(--text-primary);
    font-weight: 500;
  }
  .card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-tertiary);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
  }
  .expandable { cursor: pointer; }
  .expandable:hover { background: var(--bg-secondary); }
  .tab-row { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
  .stack { display: flex; flex-direction: column; gap: 8px; }
  .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
  .ans-btn {
    text-align: left;
    border: 0.5px solid var(--border-tertiary);
    border-radius: var(--radius-md);
    padding: 9px 13px;
    cursor: pointer;
    font-size: 13.5px;
    font-family: var(--font-sans);
    display: flex;
    align-items: flex-start;
    gap: 10px;
    line-height: 1.5;
    width: 100%;
    background: var(--bg-secondary);
    color: var(--text-primary);
    transition: background 0.1s, border-color 0.1s;
  }
  .ans-btn:hover:not(:disabled) {
    border-color: var(--border-secondary);
    background: var(--bg-primary);
  }
  .ans-btn:disabled { cursor: default; }
  table { border-collapse: collapse; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
  p { margin: 0; }

  red:   {bg:"#FCEBEB",color:"#791F1F"},
  green: {bg:"#EAF3DE",color:"#27500A"},
};

function badgeSt(c) { return BADGE_MAP[c] || BADGE_MAP.gray; }

function badge(c, text, extra="") {
  const b = badgeSt(c);
  return `<span style="background:${b.bg};color:${b.color};font-size:11px;padding:3px 9px;border-radius:8px;display:inline-block;${extra}">${text}</span>`;
}
function pill(c, text) {
  const b = badgeSt(c);
  return `<span style="background:${b.bg};color:${b.color};font-size:11px;padding:2px 9px;border-radius:100px;display:inline-block">${text}</span>`;
}

function morphSVG(n) {
  const fill = "var(--bg-secondary)", st = "var(--text-secondary)";
  const wrap = (inner) => `<svg xmlns="http://www.w3.org/2000/svg" width="84" height="44" viewBox="0 0 84 44">${inner}</svg>`;
  if (n==="Cocci")       return wrap(`<circle cx="14" cy="22" r="10" fill="${fill}" stroke="${st}" stroke-width="1.5"/><circle cx="42" cy="22" r="10" fill="${fill}" stroke="${st}" stroke-width="1.5"/><circle cx="70" cy="22" r="10" fill="${fill}" stroke="${st}" stroke-width="1.5"/>`);
  if (n==="Bacilli")     return wrap(`<rect x="4" y="14" width="22" height="16" rx="8" fill="${fill}" stroke="${st}" stroke-width="1.5"/><rect x="31" y="14" width="22" height="16" rx="8" fill="${fill}" stroke="${st}" stroke-width="1.5"/><rect x="58" y="14" width="22" height="16" rx="8" fill="${fill}" stroke="${st}" stroke-width="1.5"/>`);
  if (n==="Coccobacilli") return wrap(`<ellipse cx="14" cy="22" rx="11" ry="8" fill="${fill}" stroke="${st}" stroke-width="1.5"/><ellipse cx="42" cy="22" rx="11" ry="8" fill="${fill}" stroke="${st}" stroke-width="1.5"/><ellipse cx="70" cy="22" rx="11" ry="8" fill="${fill}" stroke="${st}" stroke-width="1.5"/>`);
  if (n==="Spirochetes") return wrap(`<path d="M4,22 C14,6 24,38 34,22 S54,6 64,22 S74,38 84,22" fill="none" stroke="${st}" stroke-width="2"/>`);
  if (n==="Vibrios")     return wrap(`<path d="M12,12 Q22,38 32,24" fill="none" stroke="${st}" stroke-width="2.5" stroke-linecap="round"/><path d="M44,10 Q54,36 64,22" fill="none" stroke="${st}" stroke-width="2.5" stroke-linecap="round"/>`);
  return '';
}

// ─── STATE ───────────────────────────────────────────────────────────────────

let state = {
  section: "basics",
  basicsTab: "comparison",
  classTab: "gram",
  labTab: "staining",
  expanded: null,
  quiz: { idx: 0, answers: {}, done: false },
};

// ─── RENDER ──────────────────────────────────────────────────────────────────

function render() {

  // ── BASICS ──────────────────────────────────────────────────────────────────
  if (s.section === "basics") {
    html += `<div class="tab-row">

    if (s.basicsTab === "comparison") {

            <th style="text-align:left;padding:8px 10px;border-bottom:0.5px solid var(--border-secondary);font-weight:500;font-size:12px">${badge("purple","Prokaryote (bacteria)")}</th>
            <th style="text-align:left;padding:8px 10px;border-bottom:0.5px solid var(--border-secondary);font-weight:500;font-size:12px">${badge("teal","Eukaryote (fungi, parasites)")}</th>
          </tr></thead>
          <tbody>${proEuData.map((r,i) => `<tr style="background:${i%2?"var(--bg-secondary)":"transparent"}">
            <td style="padding:7px 10px;font-weight:500;font-size:12px;color:var(--text-secondary)">${r.f}</td>
            <td style="padding:7px 10px">${r.p}</td>
            <td style="padding:7px 10px">${r.e}</td>
          </tr>`).join("")}</tbody>
        </table>
      </div>
      <p style="margin:1rem 0 0;font-size:12px;color:var(--text-secondary);border-top:0.5px solid var(--border-tertiary);padding-top:0.75rem">
        <span style="font-weight:500">Key clinical point:</span> The 70S vs 80S ribosome difference is the structural basis for selective antibiotic toxicity — drugs targeting 70S subunits do not affect human 80S ribosomes at therapeutic doses.
      </p></div>`;
    }

    if (s.basicsTab === "structures") {
      html += `<div class="stack">`;
      structures.forEach((st, i) => {
        const isOpen = s.expanded === `str${i}`;
        const b = badgeSt(st.bc);
        html += `<div class="card expandable" onclick="setState({expanded:'${isOpen ? 'null' : 'str'+i}'})">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap">
                <span style="font-weight:500;font-size:14px">${st.name}</span>
                <span style="background:${b.bg};color:${b.color};font-size:11px;padding:2px 9px;border-radius:8px">${st.badge}</span>
              </div>
              <p style="font-size:13px;color:var(--text-secondary);line-height:1.55">${st.sum}</p>
            </div>
            <i class="ti ${isOpen?"ti-chevron-up":"ti-chevron-down"}" aria-hidden="true" style="font-size:16px;color:var(--text-secondary);margin-left:12px;flex-shrink:0;margin-top:3px"></i>
          </div>
          ${isOpen ? `<div style="margin-top:1rem;border-top:0.5px solid var(--border-tertiary);padding-top:0.75rem">
            <p style="font-size:13px;line-height:1.65;margin-bottom:0.75rem">${st.detail}</p>
            <div style="background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px 14px;border-left:3px solid var(--border-info)">
              <p style="font-size:12px;color:var(--text-secondary);line-height:1.55"><span style="font-weight:500;color:var(--text-info)">Clinical pearl: </span>${st.pearl}</p>
            </div>
          </div>` : ""}
        </div>`;
      });
      html += `</div>`;
    }
  }

  // ── CLASSIFICATION ──────────────────────────────────────────────────────────
  if (s.section === "classification") {
    html += `<div class="tab-row">
      <button class="btn${s.classTab==='gram'?' active':''}" onclick="setState({classTab:'gram',expanded:null})">Gram stain</button>
      <button class="btn${s.classTab==='morphology'?' active':''}" onclick="setState({classTab:'morphology',expanded:null})">Morphology &amp; arrangement</button>
    </div>`;

    if (s.classTab === "gram") {
      html += `<div class="grid-2">`;
      Object.values(gramData).forEach(g => {
        html += `<div class="card" style="border-top:3px solid ${g.color}">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem">
            <div style="width:26px;height:26px;border-radius:50%;background:${g.color};flex-shrink:0"></div>
            <div>
              <p style="font-weight:500;font-size:15px">${g.label}</p>
              <p style="font-size:12px;color:var(--text-secondary)">Stains ${g.stain}</p>
            </div>
          </div>
          <table style="width:100%;font-size:13px;margin-bottom:1rem">
            ${[["Peptidoglycan wall",g.wall],["Outer membrane",g.om],["Teichoic acids",g.teich],["LPS (endotoxin)",g.lps],["Periplasmic space",g.peri]].map(([k,v]) => `<tr>
              <td style="padding:4px 0;color:var(--text-secondary);padding-right:10px;vertical-align:top;font-size:12px">${k}</td>
              <td style="padding:4px 0;line-height:1.45">${v}</td>
            </tr>`).join("")}
          </table>
          <p style="font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:6px">Prototype organisms</p>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:0.75rem">
            ${g.ex.map(e => `<span style="background:${g.bg};color:${g.tc};font-size:11px;padding:3px 9px;border-radius:100px;font-style:italic">${e}</span>`).join("")}
          </div>
          <p style="font-size:12px;color:var(--text-secondary);line-height:1.55">${g.pearl}</p>
        </div>`;
      });
      const steps = [
        ["Crystal violet","primary stain — all bacteria turn purple","#EEEDFE","#3C3489"],
        ["Iodine mordant","fixes crystal violet–iodine complex to peptidoglycan","#E6F1FB","#0C447C"],
        ["Alcohol/acetone decolorizer","CRITICAL STEP: G+ retains dye (thick PG); G− loses it","#FAECE7","#993C1D"],
        ["Safranin counterstain","decolorized G− bacteria take up pink/red counterstain","#FAEEDA","#633806"],
      ];
      html += `<div class="card" style="grid-column:1/-1;background:var(--bg-secondary)">
        <p style="font-weight:500;font-size:13px;margin-bottom:0.75rem">Gram stain procedure — step by step</p>
        ${steps.map((step, i) => `<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:7px">
          <span style="background:${step[2]};color:${step[3]};min-width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0">${i+1}</span>
          <p style="font-size:13px;line-height:1.5"><span style="font-weight:500">${step[0]}</span> — ${step[1]}</p>
        </div>`).join("")}
      </div></div>`;
    }

    if (s.classTab === "morphology") {
      html += `<div class="stack">
        <div class="card">
          <p style="font-weight:500;font-size:14px;margin-bottom:1rem">Cell morphology types</p>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:16px">
            ${morphData.map(m => `<div style="text-align:center">
              <div style="display:flex;justify-content:center;margin-bottom:8px">${morphSVG(m.n)}</div>
              <p style="font-weight:500;font-size:13px;margin-bottom:4px">${m.n}</p>
              <p style="font-size:11.5px;color:var(--text-secondary);line-height:1.4;margin-bottom:5px">${m.d}</p>
              <p style="font-size:11px;font-style:italic;color:var(--text-tertiary);line-height:1.4">${m.ex}</p>
            </div>`).join("")}
          </div>
        </div>
        <div class="card">
          <p style="font-weight:500;font-size:14px;margin-bottom:1rem">Cellular arrangement — prefix-based naming</p>
          <div class="stack" style="gap:8px">
            ${arrData.map(a => `<div style="display:flex;align-items:flex-start;gap:12px">
              <span style="background:#E6F1FB;color:#0C447C;min-width:88px;font-size:12px;padding:4px 10px;border-radius:8px;font-weight:500;text-align:center;display:inline-block;flex-shrink:0">${a.pre}</span>
              <div>
                <p style="font-size:13px;font-weight:500;margin-bottom:2px">${a.mean}</p>
                <p style="font-size:12px;color:var(--text-secondary);font-style:italic">${a.ex}</p>
              </div>
            </div>`).join("")}
          </div>
          <p style="margin-top:1rem;font-size:12px;color:var(--text-secondary);border-top:0.5px solid var(--border-tertiary);padding-top:0.75rem">
            Full description always includes Gram reaction + morphology + arrangement (e.g., "gram-positive cocci in clusters" for <em>S. aureus</em>). This 3-part description guides initial antibiotic selection before culture sensitivities are available.
          </p>
        </div>
      </div>`;
    }
  }

  // ── LAB TECHNIQUES ──────────────────────────────────────────────────────────
  if (s.section === "lab") {
    html += `<div class="tab-row">
      <button class="btn${s.labTab==='staining'?' active':''}" onclick="setState({labTab:'staining',expanded:null})">Staining methods</button>
      <button class="btn${s.labTab==='culture'?' active':''}" onclick="setState({labTab:'culture',expanded:null})">Culture media</button>
    </div>`;

    const dataset = s.labTab === "staining" ? stainData : cultData;
    const prefix = s.labTab === "staining" ? "s" : "c";
    html += `<div class="stack">`;
    dataset.forEach((item, i) => {
      const isOpen = s.expanded === `${prefix}${i}`;
      const b = badgeSt(item.col);
      const typeStr = s.labTab === "staining" ? item.purpose : item.type;
      html += `<div class="card expandable" onclick="setState({expanded:'${isOpen ? 'null' : prefix+i}'})">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap">
              <span style="font-weight:500;font-size:14px">${item.name}</span>
              <span style="background:${b.bg};color:${b.color};font-size:11px;padding:2px 9px;border-radius:100px">${typeStr}</span>
            </div>
            ${s.labTab === "staining"
              ? `<div style="display:flex;gap:6px;flex-wrap:wrap">
                  <span style="background:#EEEDFE;color:#3C3489;font-size:11px;padding:2px 8px;border-radius:8px">+ ${item.pos}</span>
                  <span style="background:#FAECE7;color:#993C1D;font-size:11px;padding:2px 8px;border-radius:8px">− ${item.neg}</span>
                </div>`
              : `<p style="font-size:13px;color:var(--text-secondary);line-height:1.5">${item.read}</p>`}
          </div>
          <i class="ti ${isOpen?"ti-chevron-up":"ti-chevron-down"}" aria-hidden="true" style="font-size:16px;color:var(--text-secondary);margin-left:12px;flex-shrink:0;margin-top:3px"></i>
        </div>
        ${isOpen ? `<div style="margin-top:1rem;border-top:0.5px solid var(--border-tertiary);padding-top:0.75rem;display:flex;flex-direction:column;gap:12px">
          ${s.labTab === "staining" ? `<div>
            <p style="font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:8px">Procedure</p>
            ${item.steps.map((step, si) => `<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:5px">
              <span style="background:#F1EFE8;color:#444441;min-width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0">${si+1}</span>
              <p style="font-size:13px;line-height:1.5">${step}</p>
            </div>`).join("")}
          </div>` : ""}
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px">
            ${s.labTab === "staining"
              ? `<div><p style="font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:3px">Best used for</p><p style="line-height:1.5">${item.bestFor}</p></div>
                 <div><p style="font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:3px">Key organism</p><p style="line-height:1.5;font-style:italic">${item.org}</p></div>`
              : `<div><p style="font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:3px">Composition</p><p style="line-height:1.5">${item.comp}</p></div>
                 <div><p style="font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:3px">Selectivity</p><p style="line-height:1.5">${item.sel}</p></div>`}
          </div>
          ${s.labTab === "culture" ? `<div>
            <p style="font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:6px">Key organisms / results</p>
            <div style="display:flex;flex-wrap:wrap;gap:4px">${item.ex.map(e => `<span style="background:${b.bg};color:${b.color};font-size:11px;padding:3px 9px;border-radius:100px">${e}</span>`).join("")}</div>
          </div>` : ""}
          <div style="background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px 14px;border-left:3px solid var(--border-info)">
            <p style="font-size:12px;color:var(--text-secondary);line-height:1.55">
              <span style="font-weight:500;color:var(--text-info)">${s.labTab==="staining"?"Exception / pearl: ":"Clinical pearl: "}</span>${s.labTab==="staining"?item.ex:item.pearl}
            </p>
          </div>
        </div>` : ""}
      </div>`;
    });
    html += `</div>`;
  }

  // ── QUIZ ────────────────────────────────────────────────────────────────────
  if (s.section === "quiz") {
    const qs = state.quiz;
    if (!qs.done) {
      const q = quiz[qs.idx];
      const answered = qs.answers[qs.idx] !== undefined;
      const secColor = {basics:"teal", classification:"purple", lab:"blue"};
      html += `<div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <span style="font-size:13px;color:var(--text-secondary)">Question ${qs.idx+1} of ${quiz.length}</span>
          <div style="display:flex;gap:4px">${quiz.map((_,i) => `<div style="width:20px;height:4px;border-radius:2px;background:${i<qs.idx?(qs.answers[i]===quiz[i].ans?"#1D9E75":"#D85A30"):i===qs.idx?"#7F77DD":"var(--border-tertiary)"}"></div>`).join("")}</div>
          ${badge(secColor[q.sec], q.sec)}
        </div>
        <div class="card">
          <p style="font-size:15px;line-height:1.65;font-weight:400;margin-bottom:1.25rem">${q.q}</p>
          <div class="stack">
            ${q.opts.map(opt => {
              const letter = opt[0];
              const chosen = answered;
              const isSel = qs.answers[qs.idx] === letter;
              const isCorr = letter === q.ans;
              let bg = "var(--bg-secondary)", bc = "var(--border-tertiary)", tc = "var(--text-primary)";
              let cursor = chosen ? "default" : "pointer";
              if (chosen) {
                if (isSel && isCorr)  { bg="#E1F5EE"; bc="#1D9E75"; tc="#085041"; }
                else if (isSel)       { bg="#FAECE7"; bc="#D85A30"; tc="#993C1D"; }
                else if (isCorr)      { bg="#E1F5EE"; bc="#1D9E75"; tc="#085041"; }
              }
              const icon = chosen && isCorr ? `<i class="ti ti-check" aria-hidden style="margin-left:auto;flex-shrink:0"></i>`
                         : chosen && isSel && !isCorr ? `<i class="ti ti-x" aria-hidden style="margin-left:auto;flex-shrink:0"></i>` : "";
              return `<button class="ans-btn" onclick="answerQuiz('${letter}')" ${chosen?"disabled":""}
                style="background:${bg};border-color:${bc};color:${tc};cursor:${cursor}">
                <span style="font-weight:500;flex-shrink:0">${letter}</span>
                <span style="flex:1">${opt.substring(3)}</span>${icon}
              </button>`;
            }).join("")}
          </div>
          ${answered ? `<div style="margin-top:1rem;border-top:0.5px solid var(--border-tertiary);padding-top:0.75rem">
            <p style="font-weight:500;font-size:13px;color:${qs.answers[qs.idx]===q.ans?"#0F6E56":"#993C1D"};margin-bottom:6px">
              ${qs.answers[qs.idx]===q.ans ? "✓ Correct" : "✗ Incorrect — correct answer: "+q.ans}
            </p>
            <p style="font-size:13px;line-height:1.65;margin-bottom:1rem">${q.rat}</p>
            <button class="btn active" onclick="${qs.idx < quiz.length-1 ? "nextQuiz()" : "finishQuiz()"}">
              ${qs.idx < quiz.length-1 ? "Next question →" : "See results →"}
            </button>
          </div>` : ""}
        </div>
      </div>`;
    } else {
      const score = Object.entries(qs.answers).filter(([i,a]) => a === quiz[i].ans).length;
      const msg = score >= 7 ? "Excellent — strong foundation for clinical microbiology."
                : score >= 5 ? "Good work — review the topics you missed and try again."
                : "Keep studying — revisit each content section and retake when ready.";
      const scoreCol = score >= 7 ? "#0F6E56" : score >= 5 ? "#BA7517" : "#993C1D";
      const missed = quiz.map((qn,i) => qs.answers[i]!==qn.ans ? `<span style="display:inline-block;margin:3px;background:#FAECE7;color:#993C1D;font-size:11px;padding:2px 9px;border-radius:100px">Q${i+1} — review ${qn.sec}</span>` : "").filter(Boolean).join("");
      html += `<div class="card"><div style="text-align:center;padding:1.5rem 0">
        <div style="font-size:52px;font-weight:500;color:${scoreCol};line-height:1;margin-bottom:0.75rem">
          ${score}<span style="font-size:24px;color:var(--text-secondary)">&thinsp;/ ${quiz.length}</span>
        </div>
        <p style="font-size:15px;color:var(--text-secondary);margin-bottom:1.5rem">${msg}</p>
        <div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:1rem">
          ${quiz.map((qn,i) => { const c = qs.answers[i]===qn.ans; return `<div style="width:36px;height:36px;border-radius:8px;background:${c?"#E1F5EE":"#FAECE7"};display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:${c?"#085041":"#993C1D"}">${i+1}</div>`; }).join("")}
        </div>
        ${missed ? `<p style="margin-bottom:1rem">${missed}</p>` : ""}
        <button class="btn active" onclick="resetQuiz()">Retake quiz</button>
      </div></div>`;
    }
  }

  document.getElementById("root").innerHTML = html;
}

// ─── STATE HELPERS ────────────────────────────────────────────────────────────

function setState(update) {
  if (update.expanded === "null") update.expanded = null;
  Object.assign(state, update);
  render();
}
function answerQuiz(letter) {
  if (state.quiz.answers[state.quiz.idx] !== undefined) return;
  state.quiz.answers[state.quiz.idx] = letter;
  render();
}
function nextQuiz() {
  if (state.quiz.idx < quiz.length - 1) { state.quiz.idx++; render(); }
}
function finishQuiz() { state.quiz.done = true; render(); }
function resetQuiz()  { state.quiz = { idx: 0, answers: {}, done: false }; render(); }

render();
</script>
